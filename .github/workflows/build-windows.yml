name: Build Windows EXE

# Construit l'exécutable Windows (.exe) et le publie comme artefact
# téléchargeable depuis l'onglet "Actions" de GitHub.
on:
  push:
    branches:
      - "cursor/**"
      - "main"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Générer l'exécutable avec PyInstaller
        run: pyinstaller gestion_app.spec --noconfirm

      - name: Publier l'exécutable (artefact téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: GestionCommerciale-Windows
          path: dist/GestionCommerciale.exe
          if-no-files-found: error
